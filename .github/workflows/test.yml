name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

jobs:
  pytest:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Opt into Node.js 24 for the bundled JavaScript actions so we don't
    # get the "Node.js 20 is deprecated" warning. Becomes the default on
    # 2026-06-02; this line can be dropped after that.
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    defaults:
      run:
        working-directory: knowledge-rag

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: knowledge-rag/pyproject.toml

      - name: Install knowledge-rag (with dev extras)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run pytest
        run: pytest tests/ -q

      - name: Surface failure summary
        if: failure()
        run: |
          echo "::error::pytest failed. Re-run locally with: pytest tests/ -q"
